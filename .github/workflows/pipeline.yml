name: Enterprise Microservices Pipeline

on:
  workflow_dispatch:

jobs:
  Build-Images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin 827919544150.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build and Push Docker Image
        run: |
          REPO_NAME="pro-${{ matrix.service }}"
          IMAGE_URI="827919544150.dkr.ecr.ap-south-1.amazonaws.com/$REPO_NAME:${{ github.sha }}"
          docker build -t $IMAGE_URI ./${{ matrix.service }}
          docker push $IMAGE_URI

  Deploy-to-EKS:
    runs-on: ubuntu-latest
    needs: Build-Images

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name MyEKS

      - name: Inject Dynamic Images into Manifests
        run: |
          sed -i "s|image: .*pro-frontend:.*|image: 827919544150.dkr.ecr.ap-south-1.amazonaws.com/pro-backend/pro-frontend:${{ github.sha }}|" k8s/frontend-deploy.yml
          sed -i "s|image: .*pro-backend:.*|image: 827919544150.dkr.ecr.ap-south-1.amazonaws.com/pro-backend:${{ github.sha }}|" k8s/backend-deploy.yml

      - name: Apply Namespaces and Configurations
        run: |
          kubectl apply -f k8s/namespaces.yml
          kubectl apply -f k8s/ --validate=false